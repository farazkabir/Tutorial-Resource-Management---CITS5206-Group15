<h1>{{ category.name }}</h1>

{% if materials %}
  {% for m in materials %}
    <div style="margin-bottom: 20px;">
      <h3>{{ m.title }}</h3>
      <p>{{ m.description }}</p>

      <a href="{{ url_for('main.view_material', material_id=m.id) }}">
        View Details
      </a>
    </div>
  {% endfor %}
{% else %}
  <p>No tutorials found in this category.</p>
{% endif %}
