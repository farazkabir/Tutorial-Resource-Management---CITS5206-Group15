<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}WMAA Tutorials{% endblock %}</title>

    <!-- Tailwind CSS (CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>

    {% block styles %}{% endblock %}
  </head>
  <body class="text-slate-900 antialiased">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mx-auto mt-4 max-w-6xl px-4 sm:px-6">
          <div class="space-y-2">
            {% for category, message in messages %}
              <div class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 shadow-sm">
                <span class="font-semibold">{{ category|capitalize }}</span> — {{ message }}
              </div>
            {% endfor %}
          </div>
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </body>
</html>
